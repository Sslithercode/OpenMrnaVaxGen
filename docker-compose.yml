services:
  # ── Streamlit UI (Steps 1–7 + Report) ────────────────────────
  app:
    build: .
    image: melanoma-pipeline
    ports:
      - "8501:8501"
    environment:
      - XDG_DATA_HOME=/root/.cache
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${REFERENCE_DIR:-./reference}:/app/reference
      - ${RESULTS_DIR:-./results}:/app/results
      - ./scripts:/app/scripts
      - ./src:/app/src
      - ./app.py:/app/app.py
      - ./entrypoint.sh:/entrypoint.sh
      - venv_data:/app/.venv
      - cache_data:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── CLI runner ─────────────────────────────────────────────
  pipeline:
    image: melanoma-pipeline
    command: ["/bin/bash"]
    environment:
      - XDG_DATA_HOME=/root/.cache
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${REFERENCE_DIR:-./reference}:/app/reference
      - ${RESULTS_DIR:-./results}:/app/results
      - ./scripts:/app/scripts
      - ./src:/app/src
      - venv_data:/app/.venv
      - cache_data:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true

  # ── Index reference genome ──────────────────────────────────
  index-reference:
    image: melanoma-pipeline
    command: >
      bash -c "
        REF=/app/reference/hg38.fa &&
        if [ ! -f $${REF}.fai ]; then
          samtools faidx $$REF;
        fi &&
        if [ ! -f /app/reference/hg38.dict ]; then
          /app/tools/gatk-4.5.0.0/gatk CreateSequenceDictionary -R $$REF;
        fi
      "
    volumes:
      - ${REFERENCE_DIR:-./reference}:/app/reference

  # ── Step 3, Phase 2: OptiType (Remains mostly the same) ───
  optitype:
    image: fred2/optitype
    # Note: fred2/optitype is a different image entirely,
    # so we keep its specific /data volume mapping.
    volumes:
      - ${OPTITYPE_DATA_DIR:-./results/step3}:/data

volumes:
  venv_data:
  cache_data:
